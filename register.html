    <main>
        <div class="container4">
            <form action="#" >
                <fieldset class="form-register">
                    <legend>
                        Register
                    </legend>
                    <label for="FirstName">First Name:</label>
                    <input type="text" id="FirstName" name="FirstName" placeholder="Enter your first name" class="width-register pd-5">
                    <br>
                    <label for="LastName">Last Name:</label>
                    <input type="text" id="LastName" name="lastname" placeholder="Enter your last name" class="width-register pd-5">
                    <br>
                    <label for="Email">Email:</label>
                    <input type="email" id="Email" name="email" placeholder="Enter your email" class="width-register pd-5">
                    <br>
                    <label for="passwordi">Password:</label>
                    <input type="password" id="passwordi" name="passwordi" placeholder="Enter your password" class="width-register pd-5">
                    <br>
                    <label for="birthdate">Enter your birthdate:</label>
                    <input type="date" id="birthdate" name="birthdate" class="width-register pd-5">
                    <br>
                    <label for="photo">Photo:</label>
                    <input type="file" accept="image/*" id="photo" name="photo" class="width-register pd-5">
                    <br>
                    <button type="submit" value="Submit" class="btn-register width-register">Submit</button>
                </fieldset>
            </form>
        </div>
    </main>
